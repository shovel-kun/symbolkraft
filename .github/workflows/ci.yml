name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Check Kotlin formatting
      run: ./gradlew ktfmtCheck --stacktrace

    - name: Build plugin
      run: ./gradlew build --stacktrace

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          build/libs/*.jar
          build/distributions/*.zip

  example-test:
    name: Test Example Project
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Publish plugin to local repository
      run: ./gradlew publishToMavenLocal --stacktrace

    - name: Test example project
      working-directory: example
      run: |
        chmod +x ./gradlew
        ./gradlew :composeApp:generateSymbolKraftIcons --stacktrace
        ./gradlew build --stacktrace

  validate-plugin:
    name: Validate Plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Validate plugin tasks
      run: |
        ./gradlew tasks --all | grep -i symbolkraft
        ./gradlew publishToMavenLocal --stacktrace

    - name: Verify plugin publication
      run: |
        test -d ~/.m2/repository/com/ebisuzawa
        find ~/.m2/repository/com/ebisuzawa -name "*.jar" | head -5

  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: [build, example-test, validate-plugin]
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore(release):')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Extract version from commit message
      id: extract_version
      run: |
        COMMIT_MSG="${{ github.event.head_commit.message }}"
        VERSION=$(echo "$COMMIT_MSG" | grep -oP 'chore\(release\):\s*v\K[0-9]+\.[0-9]+\.[0-9]+')
        if [ -z "$VERSION" ]; then
          echo "No valid version found in commit message: $COMMIT_MSG"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Update version in build files
      run: |
        VERSION=${{ steps.extract_version.outputs.version }}
        sed -i "s/version = \".*\"/version = \"$VERSION\"/" build.gradle.kts

    - name: Build release artifacts
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
        ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
        ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
      run: ./gradlew build publishToMavenLocal --stacktrace

    - name: Publish to Maven Central
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
        ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
        ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
      run: ./gradlew publishToMavenCentral --no-configuration-cache --stacktrace

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.extract_version.outputs.version }}
        name: v${{ steps.extract_version.outputs.version }}
        body: |
          ## SymbolKraft v${{ steps.extract_version.outputs.version }}

          Generate icons on-demand from multiple libraries for Compose Multiplatform with smart caching.

          ### Installation
          ```kotlin
          pluginManagement {
              repositories {
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id("com.ebisuzawa.symbolkraft") version "${{ steps.extract_version.outputs.version }}"
          }
          ```

          ### Links
          - [Maven Central](https://central.sonatype.com/artifact/com.ebisuzawa/symbolkraft)
          - [Documentation](https://github.com/shovel-kun/SymbolKraft#readme)
        files: |
          build/libs/*.jar
          build/distributions/*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify success
      run: |
        echo "SymbolKraft release completed successfully."
        echo "Published to Maven Central: https://central.sonatype.com/artifact/com.ebisuzawa/symbolkraft"
